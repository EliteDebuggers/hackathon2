<body style="padding: 2rem;">
    <h2>NTrust Web Application</h2>
    <p>Target User to Delete:</p>
    <input type="text" id="username" value="user" />
    <button onclick="sendSignedRequest()">Devele User</button>

    <h3>Server Response:</h3>
    <pre id="output">No request sent yet.</pre>
    
    <script>
        const SECRET = "ntrust"
        const ENDPOINT = "http://127.0.0.1:5000/api/v1/delete-user";

        async function computeHMAC(secret, message) {
            const encoder = new TextEncoder();
            const key = await crypto.subtle.importKey(
                'raw', encoder.encode(secret),
                { name: 'HMAC', hash: 'SHA-256' },
                false, ['sign']
            );
            const signatureBuffer = await crypto.subtle.sign('HMAC', key, encoder.encode(message));
            return Array.from(new Uint8Array(signatureBuffer))
                .map(b => b.toString(16).pasStart(2, '0')),join('');

        }

       
    </script>
